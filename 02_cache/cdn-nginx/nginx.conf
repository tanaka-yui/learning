worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- Access Log with Cache Status ---
    log_format cache_log '$remote_addr - [$time_local] "$request" $status '
                         'cache:$upstream_cache_status '
                         'upstream:$upstream_addr '
                         'response_time:${upstream_response_time}s';
    access_log /dev/stdout cache_log;

    # --- Cache Storage Configuration ---
    # levels=1:2    : Two-level directory hierarchy for cache files
    # keys_zone     : Shared memory zone name and size for storing cache keys and metadata
    # max_size      : Maximum total size of cached responses on disk
    # inactive      : Remove cached items that haven't been accessed within this duration
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=cdn_cache:10m
                     max_size=100m
                     inactive=60m;

    # --- Upstream Backend Servers ---
    upstream backend {
        server backend-1:8080;
        server backend-2:8080;
    }

    server {
        listen 8080;

        location / {
            # --- Proxy to upstream backend ---
            proxy_pass http://backend;

            # --- Cache Configuration ---
            # Enable caching using the cdn_cache zone defined in proxy_cache_path
            proxy_cache cdn_cache;

            # Composite cache key: ensures different schemes, methods, hosts, and URIs
            # are cached separately
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Cache 200 responses for 10 seconds (aligned with backend Cache-Control)
            proxy_cache_valid 200 10s;

            # --- Debug / Visibility Headers ---
            # X-Cache: shows whether the response was a HIT, MISS, EXPIRED, etc.
            add_header X-Cache $upstream_cache_status;

            # X-Cache-Key: exposes the computed cache key for debugging purposes
            add_header X-Cache-Key $scheme$request_method$host$request_uri;

            # --- Standard Proxy Headers ---
            # Forward the real client IP to the backend
            proxy_set_header X-Real-IP $remote_addr;

            # Append client IP to the X-Forwarded-For chain
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Preserve the original Host header from the client request
            proxy_set_header Host $host;
        }
    }
}
