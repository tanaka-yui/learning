apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-server
  namespace: process-thread
  labels:
    app: java-server
    language: java
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-server
  template:
    metadata:
      labels:
        app: java-server
        language: java
    spec:
      containers:
        - name: java-server
          image: pt-java:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: HEAVY_CALC_N
              value: "43"
          resources:
            requests:
              cpu: "1"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
