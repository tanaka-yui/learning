services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mastra
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [mastra]

  mastra:
    build: ./mastra
    ports:
      - "4001:4001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mastra
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [mastra]

  mastra-fastify:
    build: ./mastra-fastify
    ports:
      - "4002:4002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles: [mastra-fastify]

  strands-python:
    build: ./strands-python
    ports:
      - "4003:4003"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles: [strands-python]

  strands-typescript:
    build: ./strands-typescript
    ports:
      - "4004:4004"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles: [strands-typescript]

  claude-agent-sdk:
    build: ./claude-agent-sdk
    ports:
      - "4005:4005"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    profiles: [claude-agent-sdk]
