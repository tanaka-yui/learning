services:
  sqli-vulnerable-backend:
    build: ./sql-injection/vulnerable/backend
    ports:
      - "8080:8080"
    profiles:
      - sql-injection

  sqli-secure-backend:
    build: ./sql-injection/secure/backend
    ports:
      - "8081:8080"
    profiles:
      - sql-injection

  sqli-vulnerable-frontend:
    build: ./sql-injection/vulnerable/frontend
    ports:
      - "3000:80"
    profiles:
      - sql-injection
    depends_on:
      - sqli-vulnerable-backend

  sqli-secure-frontend:
    build: ./sql-injection/secure/frontend
    ports:
      - "3001:80"
    profiles:
      - sql-injection
    depends_on:
      - sqli-secure-backend

  xss-vulnerable-backend:
    build: ./xss/vulnerable/backend
    ports:
      - "8082:8080"
    profiles:
      - xss

  xss-secure-backend:
    build: ./xss/secure/backend
    ports:
      - "8083:8080"
    profiles:
      - xss

  xss-vulnerable-frontend:
    build: ./xss/vulnerable/frontend
    ports:
      - "3002:80"
    profiles:
      - xss
    depends_on:
      - xss-vulnerable-backend

  xss-secure-frontend:
    build: ./xss/secure/frontend
    ports:
      - "3003:80"
    profiles:
      - xss
    depends_on:
      - xss-secure-backend
